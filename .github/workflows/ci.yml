name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-run weekly so runtime updates that change behavior surface on their own.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the harness and keep it healthy on its own terms.
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -s -w:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: latest

  # The compatibility run itself: install every runtime, build bento from
  # source, and score bento against Node across the fixtures.
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      # Pin concrete versions so a compatibility result moves only when we
      # deliberately bump a runtime, not whenever a floating tag rolls forward.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.18.0"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Build bento
        # Clone bento at main and build it, rather than go install @main, so the
        # harness always scores the true latest commit instead of a proxy-cached
        # older one, while dependency checksums still verify through the proxy.
        run: |
          git clone --depth 1 https://github.com/tamnd/bento.git "$RUNNER_TEMP/bento"
          ( cd "$RUNNER_TEMP/bento" && go build -o "$RUNNER_TEMP/bento-bin" ./cmd/bento )
          echo "BENTO_BIN=$RUNNER_TEMP/bento-bin" >> "$GITHUB_ENV"

      - name: Versions
        run: |
          echo "node $(node --version)"
          echo "deno $(deno --version | head -1)"
          echo "bun  $(bun --version)"
          echo "bento $($BENTO_BIN --version || true)"

      - name: Run compatibility harness
        run: |
          go run ./cmd/bento-compat \
            --json scorecard.json \
            --markdown scorecard.md \
            --min-rate "${{ vars.MIN_RATE || '0.80' }}" \
            --target bento

      - name: Job summary
        if: always()
        run: cat scorecard.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard
          path: |
            scorecard.json
            scorecard.md
